/* ═══════════════════════════════════════════════════════════ */

const TEXTURES = {
  day:   'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
  night: 'https://unpkg.com/three-globe/example/img/earth-night.jpg',
  bump:  'https://unpkg.com/three-globe/example/img/earth-topology.png',
};

function isDark() {
  const bsTheme = document.documentElement.getAttribute('data-bs-theme');
  if (bsTheme === 'dark')  return true;
  if (bsTheme === 'light') return false;
  if (document.body.classList.contains('quarto-dark'))  return true;
  if (document.body.classList.contains('quarto-light')) return false;
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}

async function geocode(name, country) {
  const q = encodeURIComponent(`${name}, ${country}`);
  try {
    const res  = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const data = await res.json();
    if (data.length) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch (_) {}
  return null;
}

async function init() {
  const allCities = Object.entries(DATA)
    .flatMap(([cont, d]) => d.cities.map(c => ({ ...c, continent: cont, color: d.color })));

  const coords = await Promise.all(allCities.map(c => geocode(c.name, c.country)));
  coords.forEach((coord, i) => {
    if (coord) { allCities[i].lat = coord.lat; allCities[i].lng = coord.lng; }
  });
  const resolved = allCities.filter(c => c.lat != null);
  document.getElementById('globe-loading').style.display = 'none';

const continentKeys = Object.keys(DATA);

  // great-circle angle between the two endpoints
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(arc.endLat - arc.startLat);
  const dLng = toRad(arc.endLng - arc.startLng);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(arc.startLat)) *
            Math.cos(toRad(arc.endLat)) *
            Math.sin(dLng/2)**2;

  return 0.15 + (angle / Math.PI) * 0.5;
