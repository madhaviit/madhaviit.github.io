/* ── FONTS ───────────────────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

/* ── TOKENS ──────────────────────────────────────────────────── */
:root {
  --bg:       #0e0b07;
  --bg2:      #181210;
  --ink:      #f0e6d0;
  --ink2:     rgba(240,230,208,0.40);
  --ember:    rgb(255,103,31);
  --gold:     #c9a84c;
  --border:   rgba(255,255,255,0.07);
  --overlay:  rgba(6,3,1,0.72);
  --modal-bg: #181210;
  --shadow:   rgba(0,0,0,0.6);
  --font-s:   'Playfair Display', Georgia, serif;
  --font-m:   ui-monospace, 'Courier Prime', 'Courier New', monospace;
  --gap:      25px;
}

/* ── WRAP ────────────────────────────────────────────────────── */
#books-wrap {
  font-family: ui-monospace, 'Courier Prime', 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  color: var(--ink);
  transition: background 0.35s ease, color 0.25s ease;
}

/* ── MASONRY ─────────────────────────────────────────────────── */
/* ── JS MASONRY — absolute positioning, zero cascade possible ── */
.masonry {
  position: relative;
  /* height set by JS */
  flex: 1;
  padding: var(--gap);
}
/* no media queries needed — JS recalculates on resize */

/* ── BOOK CARD ───────────────────────────────────────────────── */
/*
  KEY FIX: Each card is wrapped in a padding container so that:
  1. The recommended box-shadow lives inside the wrapper padding
     and never bleeds into adjacent column space
  2. No scale transform is used — scaling expands layout and
     nudges other cards, causing the cascade hover bug
*/
.book-card {
  position: absolute; /* JS sets top/left/width */
  cursor: pointer;
  border-radius: 3px;
}
.book-card.hidden { display: none; }

/* inner wrapper clips cover image */
.book-card-inner {
  position: relative;
  border-radius: 3px;
  overflow: hidden;
}

.book-cover {
  width: 100%; display: block; border-radius: 3px;
  transition: filter 0.38s ease;
  box-shadow: 0 3px 10px var(--shadow);
}
.book-no-cover {
  width: 100%; aspect-ratio: 2/3;
  background: var(--bg2); border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  padding: 0.6rem; font-size: 0.6rem; color: var(--ink);
  opacity: 0.4; text-align: center; line-height: 1.4;
  transition: filter 0.38s ease;
}

/* ── HOVER OVERLAY ───────────────────────────────────────────── */
.hover-overlay {
  position: absolute; inset: 0; border-radius: 3px;
  background: var(--overlay);
  padding: 0.8rem 0.7rem;
  display: flex; flex-direction: column; justify-content: flex-end;
  opacity: 0; transition: opacity 0.28s ease; pointer-events: none;
}
.book-card:hover .hover-overlay       { opacity: 1; }
.book-card:hover .book-cover,
.book-card:hover .book-no-cover       { filter: brightness(0.45); }

.hov-title  {
  font-family: var(--font-s); font-size: 0.78rem; font-weight: 700;
  line-height: 1.25; color: var(--ember); margin-bottom: 0.12rem;
}
.hov-author {
  font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: #f0e6d0; opacity: 0.48; margin-bottom: 0.38rem;
}
.hov-rating { font-size: 0.65rem; color: var(--gold); margin-bottom: 0.22rem; }
.hov-cta    {
  font-size: 0.5rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: #f0e6d0; opacity: 0.22;
}

/* ── RECOMMENDED GLOW ────────────────────────────────────────── */
/* With grid layout each cell is isolated — glow stays within cell */
.book-card.recommended .book-card-inner {
  box-shadow:
    0 0 0 1px rgba(201,168,76,0.5),
    0 0 10px 2px rgba(201,168,76,0.2),
    0 0 22px 4px rgba(201,168,76,0.08);
}

.hov-recommended {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.52rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); border: 1px solid rgba(201,168,76,0.45);
  border-radius: 2px; padding: 0.18rem 0.5rem; margin-bottom: 0.45rem;
  align-self: flex-start; background: rgba(201,168,76,0.08);
}

/* ── BOTTOM BAR ──────────────────────────────────────────────── */
#bottom-bar {
  z-index: 20;
  padding: 0.7rem 1.6rem 0.8rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 0.7rem;
  transition: border-color 0.35s ease;
}

#bar-left { display: flex; flex-direction: column; gap: 0.3rem; }
#page-label { text-decoration: none; }
#page-label:hover .pl-name { color: var(--ember); }
.pl-name {
  font-size: 13px; font-weight: 500; color: var(--ink);
  letter-spacing: 0.06em; font-family: var(--font-m); transition: color 0.2s ease;
}
.pl-sub {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink2); font-family: var(--font-m); transition: color 0.35s ease;
}

#stats-row {
  display: flex; gap: 1.4rem; flex-wrap: wrap; align-items: center;
}
.stat { text-align: center; cursor: default; }
.stat.filterable { cursor: pointer; }
.stat-value {
  font-family: var(--font-s); font-size: 1.1rem; font-weight: 700;
  line-height: 1; color: var(--ink); transition: color 0.2s ease;
}
.stat.filterable:hover .stat-value,

.stat-label {
  font-size: 0.52rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--ink2); margin-top: 0.18rem; transition: color 0.2s ease;
}
.stat.filterable.active .stat-label { color: var(--ember); opacity: 0.7; }
.stat.filterable.active .stat-value::after { content: ' ×'; font-size: 0.9rem; opacity: 0.5; }

/* ── MODAL BACKDROP ──────────────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(4,2,1,0.88);
  z-index: 900; display: flex; align-items: center; justify-content: center;
  padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--modal-bg); border: 1px solid var(--border);

<script>
(function () {

  /* ── THEME ───────────────────────────────────────────────── */
  function isDark() {
    var bsTheme = document.documentElement.getAttribute('data-bs-theme');
    if (bsTheme === 'dark')  return true;
    if (bsTheme === 'light') return false;
    if (document.body.classList.contains('quarto-dark'))  return true;
    if (document.body.classList.contains('quarto-light')) return false;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function applyTheme() {
    var dark = isDark();
    var el   = document.documentElement;
    var wrap = document.getElementById('books-wrap');
    if (dark) {
      el.style.setProperty('--bg',       '#0e0b07');
      el.style.setProperty('--bg2',      '#181210');
      el.style.setProperty('--ink',      '#f0e6d0');
      el.style.setProperty('--ink2',     'rgba(240,230,208,0.40)');
      el.style.setProperty('--gold',     '#c9a84c');
      el.style.setProperty('--border',   'rgba(255,255,255,0.07)');
      el.style.setProperty('--overlay',  'rgba(6,3,1,0.72)');
      el.style.setProperty('--modal-bg', '#181210');
      el.style.setProperty('--shadow',   'rgba(0,0,0,0.6)');
    } else {
      el.style.setProperty('--bg',       '#1c1610');
      el.style.setProperty('--bg2',      '#261e14');
      el.style.setProperty('--ink',      '#e8dcc8');
      el.style.setProperty('--ink2',     'rgba(232,220,200,0.42)');
      el.style.setProperty('--gold',     '#c9a84c');
      el.style.setProperty('--border',   'rgba(255,255,255,0.09)');
      el.style.setProperty('--overlay',  'rgba(8,5,2,0.72)');
      el.style.setProperty('--modal-bg', '#1c1610');
      el.style.setProperty('--shadow',   'rgba(0,0,0,0.45)');
    }
    var bg = dark ? '#0e0b07' : '#1c1610';
    document.documentElement.style.background = bg;
    document.body.style.background = bg;
    if (wrap) wrap.style.background = bg;
    ['quarto-content','quarto-document-content'].forEach(function(id) {
      var node = document.getElementById(id);
      if (node) node.style.background = bg;
    });
    document.querySelectorAll('.page-full,.page-columns,main.content').forEach(function(n) {
      n.style.background = bg;
    });
  }

  applyTheme();
  new MutationObserver(applyTheme).observe(document.documentElement, { attributes: true, attributeFilter: ['data-bs-theme','class'] });
  new MutationObserver(applyTheme).observe(document.body, { attributes: true, attributeFilter: ['class'] });
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

  /* ── HELPERS ─────────────────────────────────────────────── */
  var NO_PHOTO     = "nophoto/book";
  var allBooks     = [];
  var activeFilter = null;

  function safe(s) {
    return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function stars(r) {
    var n = parseInt(r,10);
    if (!n||n<1) return "";
    return "★".repeat(n)+"☆".repeat(5-n);
  }
  function realCover(url) { return url && !url.includes(NO_PHOTO); }

  /* ── JS MASONRY LAYOUT ENGINE ───────────────────────────────
     Absolutely positions each card into the shortest column.
     Cards are fully isolated — hover on one cannot affect another.
  ─────────────────────────────────────────────────────────── */
  function getColCount(width) {
    if (width >= 1100) return 5;
    if (width >= 750)  return 4;
    if (width >= 480)  return 3;
    return 2;
  }

  function layoutMasonry() {
    var grid  = document.getElementById("masonry-grid");
    var cards = Array.from(grid.querySelectorAll(".book-card:not(.hidden)"));
    if (!cards.length) return;

    var gap     = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap')) || 14;
    var padding = gap; /* matches .masonry { padding: var(--gap) } */
    var total   = grid.offsetWidth;
    var cols    = getColCount(total);
    var colW    = (total - padding * 2 - gap * (cols - 1)) / cols;

    /* Split cards into N equal columns sequentially —
       col 0 gets cards 0..chunk-1, col 1 gets chunk..2chunk-1, etc. */
    var chunk   = Math.ceil(cards.length / cols);
    var colH    = new Array(cols).fill(padding);

    cards.forEach(function(card, i) {
      var colIdx = Math.min(Math.floor(i / chunk), cols - 1);
      var left   = padding + colIdx * (colW + gap);

      card.style.width = colW + "px";
      card.style.left  = left + "px";
      card.style.top   = colH[colIdx] + "px";

      colH[colIdx] += card.offsetHeight + gap;
    });

    var gridHeight = Math.max.apply(null, colH) + padding;
    grid.style.height = gridHeight + "px";

    /* Push footer below the absolutely positioned grid */
    var footer = document.getElementById("page-footer");
    if (footer) footer.style.marginTop = gridHeight + "px";
  }

  /* Re-layout on window resize */
  var _layoutTimer;
  window.addEventListener("resize", function() {
    clearTimeout(_layoutTimer);
    _layoutTimer = setTimeout(layoutMasonry, 80);
  });

  /* ── FILTER ──────────────────────────────────────────────── */
  function applyFilter(rating) {
    activeFilter = activeFilter === rating ? null : rating;
    document.querySelectorAll(".stat.filterable").forEach(function(el) {
      el.classList.toggle("active", el.dataset.filter === activeFilter);
    });
    document.querySelectorAll(".book-card").forEach(function(card) {
      if (!activeFilter) { card.classList.remove("hidden"); return; }
      card.classList.toggle("hidden", parseInt(card.dataset.rating,10) !== parseInt(activeFilter,10));
    });
    layoutMasonry();
  }

  document.getElementById("filter-5").addEventListener("click", function(){ applyFilter("5"); });
  document.getElementById("filter-4").addEventListener("click", function(){ applyFilter("4"); });

  /* ── MODAL ───────────────────────────────────────────────── */
  var backdrop = document.getElementById("modal-backdrop");

  function openModal(book) {
    document.getElementById("modal-title").textContent  = book.title  || "";
    document.getElementById("modal-author").textContent = book.author || "";
    document.getElementById("modal-rating").textContent = stars(book.rating);
    var revEl = document.getElementById("modal-review-text");
    var rev   = (book.review||"").trim();
    revEl.className   = rev ? "modal-review" : "modal-no-review";
    revEl.textContent = rev || "No review written yet.";
    var desc    = (book.description||"").trim();
    var descSec = document.getElementById("modal-desc-section");
    if (desc) {
      document.getElementById("modal-description").textContent = desc;
      descSec.style.display = "";
    } else {
      descSec.style.display = "none";
    }
    var coverEl  = document.getElementById("modal-cover");
    var imgHtml  = realCover(book.cover)
      ? '<img src="'+safe(book.cover)+'" alt="'+safe(book.title)+'" loading="lazy">'
      : '<div class="no-cover-ph">'+safe(book.title)+'</div>';
    var linkHtml = '<a class="modal-cover-link" href="'+(book.link||"#")+'" target="_blank" rel="noopener">View on<br>Goodreads ↗</a>';
    coverEl.innerHTML = imgHtml + linkHtml;
    backdrop.classList.add("open");
  }

  function closeModal() {
    backdrop.classList.remove("open");
  }

  document.getElementById("modal-close").addEventListener("click", closeModal);
  backdrop.addEventListener("click", function(e){ if(e.target===backdrop) closeModal(); });
  document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeModal(); });

  /* ── BUILD CARD ──────────────────────────────────────────── */
  function buildCard(book) {
    var card = document.createElement("div");
    card.className = "book-card";
    card.dataset.rating = book.rating || "0";

    var isRecommended = book.recommended === true;
    if (isRecommended) card.classList.add("recommended");

    var r     = stars(book.rating);
    var cover = realCover(book.cover)
      ? '<img class="book-cover" src="'+safe(book.cover)+'" alt="'+safe(book.title)+'" loading="lazy" decoding="async">'
      : '<div class="book-no-cover">'+safe(book.title)+'</div>';

    var badge = isRecommended ? '<div class="hov-recommended">★ Recommended</div>' : '';

    /* NOTE: .book-card-inner wraps the cover+overlay so overflow:hidden
       clips the image correctly without clipping the outer glow */
    card.innerHTML =
      '<div class="book-card-inner">'
      + cover
      + '<div class="hover-overlay">'
      + badge
      + '<div class="hov-title">'+safe(book.title)+'</div>'
      + '<div class="hov-author">'+safe(book.author)+'</div>'
      + (r ? '<div class="hov-rating">'+r+'</div>' : '')
      + '<div class="hov-cta">click for review</div>'
      + '</div>'
      + '</div>';

    card.addEventListener("click", function(){ openModal(book); });
    return card;
  }

  /* ── STATS ───────────────────────────────────────────────── */
  function computeStats(books) {
    var ratings  = books.map(function(b){ return parseInt(b.rating,10); }).filter(function(n){ return n>0; });
    var fiveStar = ratings.filter(function(n){ return n===5; }).length;
    var fourStar = ratings.filter(function(n){ return n===4; }).length;
    var authors  = new Set(books.map(function(b){ return (b.author||"").trim().toLowerCase(); }).filter(Boolean)).size;
    document.getElementById("stat-total").textContent   = books.length;
    document.getElementById("stat-5star").textContent   = fiveStar;
    document.getElementById("stat-4star").textContent   = fourStar;
    document.getElementById("stat-authors").textContent = authors;
  }

  /* ── FETCH ───────────────────────────────────────────────── */
  fetch("books-data.json")
    .then(function(r){
      if(!r.ok) throw new Error("books-data.json not found (HTTP "+r.status+")");
      return r.json();
    })
    .then(function(books){
      if(!Array.isArray(books)||!books.length) throw new Error("books-data.json is empty.");
      allBooks = books;
      computeStats(books);
      var grid = document.getElementById("masonry-grid");
      var frag = document.createDocumentFragment();

      /* ── Sort by author, fill columns sequentially ────────────
         Books sorted A→Z by author, then split into N equal chunks,
         one chunk per column. Column 0 fills top-to-bottom first,
         then column 1, etc. Same author stays in same column.
      ────────────────────────────────────────────────────────── */
      var sorted = books.slice().sort(function(a,b){
        return (a.author||"").localeCompare(b.author||"");
      });
      /* Original RSS order (uncomment to revert):
      // var sorted = books; */

      sorted.forEach(function(b){ frag.appendChild(buildCard(b)); });
      grid.appendChild(frag);

      /* Layout once immediately, then again after images load for accurate heights */
      layoutMasonry();
      var imgs = grid.querySelectorAll("img");
      var loaded = 0;
      if (imgs.length) {
        imgs.forEach(function(img) {
          if (img.complete) {
            loaded++;
            if (loaded === imgs.length) layoutMasonry();
          } else {
            img.addEventListener("load",  function() { loaded++; if (loaded === imgs.length) layoutMasonry(); });
            img.addEventListener("error", function() { loaded++; if (loaded === imgs.length) layoutMasonry(); });
          }
        });
      }
    })
    .catch(function(err){
      document.getElementById("masonry-grid").innerHTML =
        '<p style="padding:3rem 2rem;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;opacity:0.35;">✕ &nbsp;'+err.message+'</p>';
      console.error("[books]", err);
    });

})();
</script>

          // Handle positioning of the toggle
      window.addEventListener(
        "resize",
        throttle(() => {
          elRect = undefined;
          if (selectedAnnoteEl) {
            selectCodeLines(selectedAnnoteEl);
          }
        }, 10)
      );
      function throttle(fn, ms) {
      let throttle = false;
      let timer;
        return (...args) => {
          if(!throttle) { // first call gets through
              fn.apply(this, args);
              throttle = true;
          } else { // all the others get throttled
              if(timer) clearTimeout(timer); // cancel #2
              timer = setTimeout(() => {
                fn.apply(this, args);
                timer = throttle = false;
              }, ms);
          }
        };
      }
        // Attach click handler to the DT
        const annoteDls = window.document.querySelectorAll('dt[data-target-cell]');
        for (const annoteDlNode of annoteDls) {
          annoteDlNode.addEventListener('click', (event) => {
            const clickedEl = event.target;
            if (clickedEl !== selectedAnnoteEl) {
              unselectCodeLines();
              const activeEl = window.document.querySelector('dt[data-target-cell].code-annotation-active');
              if (activeEl) {
                activeEl.classList.remove('code-annotation-active');
              }
              selectCodeLines(clickedEl);
              clickedEl.classList.add('code-annotation-active');
            } else {
              // Unselect the line
              unselectCodeLines();
              clickedEl.classList.remove('code-annotation-active');
            }
          });
        }
    const findCites = (el) => {
      const parentEl = el.parentElement;
      if (parentEl) {
        const cites = parentEl.dataset.cites;
        if (cites) {
          return {
            el,
            cites: cites.split(' ')
          };
        } else {
          return findCites(el.parentElement)
        }
      } else {
        return undefined;
      }
    };
    var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
    for (var i=0; i<bibliorefs.length; i++) {
      const ref = bibliorefs[i];
      const citeInfo = findCites(ref);
      if (citeInfo) {
        tippyHover(citeInfo.el, function() {
          var popup = window.document.createElement('div');
          citeInfo.cites.forEach(function(cite) {
            var citeDiv = window.document.createElement('div');
            citeDiv.classList.add('hanging-indent');
            citeDiv.classList.add('csl-entry');
            var biblioDiv = window.document.getElementById('ref-' + cite);
            if (biblioDiv) {
              citeDiv.innerHTML = biblioDiv.innerHTML;
            }
            popup.appendChild(citeDiv);
          });
          return popup.innerHTML;
        });
      }
    }
  });
